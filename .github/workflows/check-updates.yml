name: Check WSDC updates

on:
  # AUTO-SCHEDULE PAUSED (manual mode until pipeline is stable — see docs/MANUAL_PIPELINE.md)
  # schedule:
  #   # Europe/Madrid (CEST, UTC+2). GitHub cron is UTC — may slip 15–60+ min.
  #   - cron: "0 18 * * 1-5"   # Mon–Fri 20:00 CEST
  #   - cron: "0 5 * * 2-5"    # Tue–Fri 07:00 CEST
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  probe:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe WSDC API
        id: detect
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: require
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          python scripts/check_updates.py --write-probe --json-report probe_report.json | tee probe.log
          cat probe.log
          python scripts/telegram_notify.py probe probe_report.json
          if grep -q "^changed$" probe.log; then
            python scripts/telegram_notify.py parse-start probe_report.json
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  trigger-full-parse:
    needs: probe
    if: needs.probe.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Warn and trigger pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::WSDC source data changed on points.worldsdc.com."
          echo "If data/*.csv is committed, full-parse will load and export."
          echo "Otherwise run parser locally, copy CSVs to data/, commit, re-run."
          gh workflow run full-parse.yml \
            --repo "${{ github.repository }}" \
            --field source=github-actions \
            --field export_only=false \
            --field data_dir=data \
            --field parse_full=true \
            --field notify_parse_start=false
