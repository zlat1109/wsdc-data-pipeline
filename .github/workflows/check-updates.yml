name: Check WSDC updates

on:
  schedule:
    # Europe/Madrid (CEST, UTC+2): Mon–Fri, alternating 22:00 / 09:00 local
    #   Mon 22:00, Tue 09:00, Wed 22:00, Thu 09:00, Fri 22:00
    # In CET (winter, UTC+1) these run at 23:00 / 10:00 Spain time.
    - cron: "0 20 * * 1,3,5"   # Mon/Wed/Fri 22:00 CEST
    - cron: "0 7 * * 2,4"      # Tue/Thu 09:00 CEST
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  probe:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe WSDC API
        id: detect
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: require
        run: |
          set -e
          output=$(python scripts/check_updates.py --write-probe)
          echo "$output"
          if echo "$output" | grep -q "^changed$"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  trigger-full-parse:
    needs: probe
    if: needs.probe.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Warn and trigger pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::WSDC source data changed on points.worldsdc.com."
          echo "If data/*.csv is committed, full-parse will load and export."
          echo "Otherwise run parser locally, copy CSVs to data/, commit, re-run."
          gh workflow run full-parse.yml \
            --repo "${{ github.repository }}" \
            --field source=github-actions \
            --field export_only=false \
            --field data_dir=data
