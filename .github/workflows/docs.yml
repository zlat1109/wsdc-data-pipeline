name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "db/migrations/**"
      - "db/quality_checks.py"
      - "export.py"
      - "scripts/generate_schema_docs.py"
      - "scripts/sync_docs.py"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync auto-maintained docs
        run: python scripts/sync_docs.py

      - name: Commit doc sync (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/database/_generated docs/database/migrations.md docs/database/export-views.md docs/operations/quality-monitoring.md
          git diff --staged --quiet || git commit -m "docs: auto-sync generated fragments [skip ci]"
          git push

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
