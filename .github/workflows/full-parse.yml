name: Full WSDC parse pipeline

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Run source label for parse_runs"
        required: false
        default: github-actions
        type: choice
        options:
          - github-actions
          - local
      export_only:
        description: "Skip load step; re-export CSV from Supabase only"
        required: false
        default: false
        type: boolean
      data_dir:
        description: "Path to parser CSV directory (required if export_only=false)"
        required: false
        default: data
        type: string
      parse_new_only:
        description: "Run HTTP cloud parser for new IDs above DB watermark before load"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run HTTP cloud parser (incremental)
        if: ${{ !inputs.export_only && inputs.parse_new_only }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: require
        run: python scripts/cloud_parse.py --new-only --base-dir data

      - name: Verify CSV inputs exist
        if: ${{ !inputs.export_only && !inputs.parse_new_only }}
        run: |
          if [ ! -f "${{ inputs.data_dir }}/dancers_points_info.csv" ]; then
            echo "Missing CSVs in ${{ inputs.data_dir }}/ — run with parse_new_only=true or commit data/*.csv"
            exit 1
          fi

      - name: Run pipeline (migrations -> load -> export)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: require
        run: |
          set -e
          args=(python scripts/run_pipeline.py --source "${{ inputs.source }}")
          if [ "${{ inputs.export_only }}" = "true" ]; then
            args+=(--export-only)
          else
            args+=(--data-dir "${{ inputs.data_dir }}")
          fi
          "${args[@]}"

      - name: Commit exported CSV files
        id: commit_csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --staged --quiet; then
            echo "No CSV changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): update WSDC CSV export [skip ci]"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram (pipeline complete)
        if: success() && inputs.export_only != true
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: require
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PIPELINE_CSV_COMMITTED: ${{ steps.commit_csv.outputs.committed }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/telegram_notify.py pipeline-complete
